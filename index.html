<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SchoolHub Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              lamaSky: "#C3EBFA",
              lamaSkyLight: "#EDF9FD",
              lamaPurple: "#CFCEFF",
              lamaPurpleLight: "#F1F0FF",
              lamaYellow: "#FAE27C",
              lamaYellowLight: "#FEFCE8",
              lamaSkyDark: "#1e3a4a",
              lamaSkyLightDark: "#162d3a",
              lamaPurpleDark: "#2d2b5e",
              lamaPurpleLightDark: "#1e1d3a",
              lamaYellowDark: "#4a3f1a",
              lamaYellowLightDark: "#2a2510",
            }
          }
        }
      }
    </script>
    <script>
      // Prevent flash of wrong theme
      (function() {
        const theme = localStorage.getItem('schoolhub-theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      /* Dark mode scrollbar */
      html.dark ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      html.dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      html.dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
      @keyframes modalSlideIn {
        from { opacity: 0; transform: scale(0.95) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      /* Recharts dark mode */
      html.dark .recharts-default-tooltip {
        background-color: #1e293b !important;
        border-color: #334155 !important;
        color: #e2e8f0 !important;
      }
      html.dark .recharts-tooltip-item {
        color: #e2e8f0 !important;
      }
      html.dark .recharts-legend-item-text {
        color: #94a3b8 !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-100 text-slate-800 dark:bg-slate-950 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
